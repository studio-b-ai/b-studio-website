<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AcuOps — Acumatica DevOps Platform</title>

<!-- This URL is retired; the canonical AcuOps surface lives at acuops.com.
     Three redirect mechanisms in priority order: meta-refresh (most clients
     honor it), JavaScript replace (no history entry), visible link fallback. -->

<meta http-equiv="refresh" content="0; url=https://acuops.com/">
<link rel="canonical" href="https://acuops.com/">

<meta name="description" content="AcuOps has moved to acuops.com — the Acumatica DevOps platform from Studio b. Continuous monitoring, CI/CD for customizations, post-publish validation. $300/mo per Acumatica instance, flat.">
<meta name="robots" content="noindex, follow">

<meta property="og:type" content="website">
<meta property="og:site_name" content="AcuOps">
<meta property="og:title" content="AcuOps — Acumatica DevOps Platform">
<meta property="og:description" content="The Acumatica DevOps platform from Studio b. Continuous monitoring, CI/CD for customizations, post-publish validation.">
<meta property="og:url" content="https://acuops.com/">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/header.css">

<style>
  :root {
    --paper: #F4F1EB;
    --ink: #0D0D0D;
    --ink-60: rgba(13, 13, 13, 0.60);
    --forest: #1A3328;
    --vermillion: #D94425;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* Masthead stripe: see /assets/header.css (family binary-accent system, structural variant) */

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
  }

  .card {
    max-width: 640px;
    text-align: center;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--vermillion);
    margin-bottom: 1.5rem;
  }
  h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 4vw, 2.6rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 1.2rem;
  }
  h1 b { color: var(--forest); }
  p {
    font-size: 1.05rem;
    color: var(--ink-60);
    margin-bottom: 2rem;
    max-width: 52ch;
    margin-left: auto;
    margin-right: auto;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    background: var(--forest);
    color: var(--paper);
    padding: 0.95rem 1.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    text-decoration: none;
    transition: background 0.12s, color 0.12s;
  }
  .cta:hover { background: var(--vermillion); color: #fff; }
  .cta .arrow { font-family: 'JetBrains Mono', monospace; }

  footer {
    text-align: center;
    padding: 2rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-60);
    border-top: 1px solid rgba(13, 13, 13, 0.10);
  }
  footer a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--vermillion);
  }
</style>
</head>
<body>

<div class="stripe thin"></div>

<main>
  <div class="card">
    <div class="eyebrow">AcuOps · Studio b.</div>
    <h1>AcuOps now lives at <b>acuops.com</b>.</h1>
    <p>You're being redirected automatically. If your browser doesn't move, the link is below.</p>
    <a class="cta" href="https://acuops.com/">
      Continue to acuops.com <span class="arrow">→</span>
    </a>
  </div>
</main>

<footer>
  <a href="https://b.studio/">← b.studio</a>
</footer>

<script>
  // JS belt-and-braces: replace() so back button doesn't bounce users
  // back here from acuops.com.
  if (window.location.hostname !== 'acuops.com') {
    window.location.replace('https://acuops.com/');
  }
</script>

</body>
</html>
